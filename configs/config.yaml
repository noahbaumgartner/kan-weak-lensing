hydra:
  run:
    dir: .

seed: 42
mlflow_tracking_uri: http://127.0.0.1:9299

trainer:
  _target_: src.training.trainer.Trainer

defaults:
  - model: fastkan
  - dataset: weak_lensing
  - training: default
  - optimizer: adam
  # Versuch / Trainings-Objective. Bestimmt loss + output_dim:
  #   score -> 4 Outputs, score_inference-Loss (Leaderboard-Objective)
  #   mse   -> 2 Outputs, reine MSE-Regression
  # Eigenen Versuch: configs/objective/<name>.yaml anlegen, dann objective=<name>.
  - objective: score
  - _self_
