_target_: src.dataset.WeakLensingDataset

# Path to the .npy files released by the FAIR-Universe challenge.
data_dir: /cluster/projects/ska/weak-lensing/data/

# Labels: keep (Omega_m, S_8) — the 2 cosmological parameters.
n_targets: 2

# Recommended split along the nuisance-parameter axis (axis=1).
val_fraction: 0.2
split_seed: 5566

# noise_seed: null -> fresh shape-noise every epoch (augmentation).
noise_seed: null
ng: 30.0
pixel_size_arcmin: 2.0
standardize: true

task_type: regression

# FAIR-Universe weak-lensing challenge: train against the negative of
# the leaderboard "score_inference" (KL divergence between true and
# predicted Gaussian posteriors, with a lambda=1e3 penalty on the point
# estimate). The trainer also logs MSE on mu and the 68% coverages
# (per-parameter and mean) defined in the competition overview.
loss: score_inference

# image metadata (used by vision models e.g. CNN / KAT)
img_height: 1424
img_width: 176
in_chans: 1

# MLP-style KANs flatten the input, so the 1424x176 map is reduced first.
# reduction: avgpool | kymatio (2D scattering, spatial dims global-avg-pooled).
# input_dim is derived from the active method+params so it always matches the
# runtime ReductionWrapper. Default avgpool/stride=8 -> 178*22 = 3916 px.
reduction: avgpool
pool_stride: 8
scattering_J: 3
scattering_L: 8
scattering_order: 2
input_dim: ${reduced_dim:${dataset.reduction},${dataset.img_height},${dataset.img_width},${dataset.in_chans},${dataset.pool_stride},${dataset.scattering_J},${dataset.scattering_L},${dataset.scattering_order}}

# Predicting (mu, log_sigma) for each cosmological parameter -> 4 outputs.
# (mu_Om, mu_S8, log_sigma_Om, log_sigma_S8). The labels themselves are
# 2-dim (Om, S8) -- only the model head is widened. The score_inference
# loss in src/training/metrics.py splits this 4-vector internally.
output_dim: 4
num_targets: 4

# Width / depth knobs consumed by the MLP-style model configs
# (fastkan / fasterkan / wavkan) via make_width and the sweep ranges.
n_hidden: 2
n_hidden_min: 1
n_hidden_max: 3
hidden_width_min: 128
hidden_width_max: 512
