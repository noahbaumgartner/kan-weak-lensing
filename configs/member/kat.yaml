# Nesting-safe KAT member for the ensemble. configs/model/kat.yaml already
# only references ${dataset.*} (no ${model.*} self-refs), so it resolves
# correctly nested under model.member — this is that same config, reused
# verbatim as the member group entry.
_target_: src.models.kat_model.KATModel

output_dim: ${dataset.output_dim}
img_h: ${dataset.img_size_h}
img_w: ${dataset.img_size_w}
in_chans: ${dataset.in_chans}
patch_size: ${dataset.patch_size}

embed_dim: 64
depth: 4
num_heads: 4
mlp_ratio: 4.0
qkv_bias: true

drop_rate: 0.0
proj_drop_rate: 0.0
attn_drop_rate: 0.0
drop_path_rate: 0.0

global_pool: token
act_init: gelu
weight_init: kan

native_h: ${dataset.img_height}
native_w: ${dataset.img_width}
stem_channels: 8
stem_layers: 3
