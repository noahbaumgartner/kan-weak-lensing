# @package _global_
defaults:
  - override /objective: ensemble
  - override /member@model.member: efficientkan

model:
  n_members: 8
  grid_jitter: 4
  member:
    layers_hidden: [128, 384, 512, 128, 2]
    k: 3
    grid_size: 29

dataset:
  reduction: conv
  pool_stride: 7
  conv_channels: 128
  conv_layers: 2
  conv_stride_h: 4
  conv_stride_w: 2
  conv_kernel: 7

optimizer:
  lr: 0.001
  weight_decay: 0.0

training:
  batch_size: 256
  epochs: 40
  early_stopping: false
  es_patience: 15
  es_min_delta: 0.0001
  es_restore_best: true
