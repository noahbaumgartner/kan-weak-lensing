# @package _global_
defaults:
  - override /objective: ensemble
  - override /member@model.member: wavkan

model:
  n_members: 8
  grid_jitter: 0
  member:
    layers_hidden: [32, 512, 2]
    wavelet_type: dog

dataset:
  reduction: conv
  pool_stride: 9
  conv_channels: 32
  conv_layers: 2
  conv_stride_h: 4
  conv_stride_w: 2
  conv_kernel: 3

optimizer:
  lr: 0.001
  weight_decay: 0.0

training:
  batch_size: 256
  epochs: 40
  early_stopping: false
  es_patience: 15
  es_min_delta: 0.0001
  es_restore_best: true
