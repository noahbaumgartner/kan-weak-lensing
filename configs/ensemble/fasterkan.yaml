# @package _global_
defaults:
  - override /objective: ensemble
  - override /member@model.member: fasterkan

model:
  n_members: 8
  grid_jitter: 3
  member:
    layers_hidden: [32, 512, 2]
    num_grids: 18
    exponent: 4
    inv_denominator: 0.6470812591045023

dataset:
  reduction: conv
  pool_stride: 7
  conv_channels: 32
  conv_layers: 2
  conv_stride_h: 4
  conv_stride_w: 2
  conv_kernel: 7

optimizer:
  lr: 0.001
  weight_decay: 0.0

training:
  batch_size: 256
  epochs: 40
  early_stopping: false
  es_patience: 15
  es_min_delta: 0.0001
  es_restore_best: true
