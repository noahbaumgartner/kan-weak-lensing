# @package _global_
defaults:
  - override /objective: ensemble
  - override /member@model.member: fastkan

model:
  n_members: 8
  grid_jitter: 1
  member:
    layers_hidden: [16, 384, 512, 128, 2]
    num_grids: 7

dataset:
  reduction: conv
  pool_stride: 8
  conv_channels: 16
  conv_layers: 2
  conv_stride_h: 4
  conv_stride_w: 2
  conv_kernel: 5

optimizer:
  lr: 0.001
  weight_decay: 0.0

training:
  batch_size: 256
  epochs: 40
  early_stopping: false
  es_patience: 15
  es_min_delta: 0.0001
  es_restore_best: true
