epochs: 500
batch_size: 256
lamb: 0.0
device: auto

# Validation-loss early stopping. Stops a trial once val loss hasn't improved
# for `es_patience` epochs and restores the best weights; results are truncated
# to the best epoch so logged finals / the Optuna objective reflect it.
# Lets mse trials terminate early (smooth, fast convergence) while score-
# inference trials use more of the 50-epoch budget.
#   es_min_delta is *relative* (fraction of the current best): 0.005 -> an epoch
#   must beat the best by 0.5% to reset patience. Relative so it works across
#   the mse and score objectives' very different loss scales. Set 0.0 to count
#   any decrease as an improvement.
early_stopping: true
es_patience: 12
es_min_delta: 0.001
es_restore_best: true
