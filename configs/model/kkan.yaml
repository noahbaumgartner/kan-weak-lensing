_target_: src.models.kkan_model.KKANModel

output_dim: ${dataset.output_dim}
# Conv-KAN front-end resize target: /4 of the native 1424x176 map (was /8 =
# 178x22 via dataset.img_size_h/w). More small-scale signal at ~4x GPU memory
# (still well within budget; the /8 run used only ~11%). kat is unaffected — it
# still uses dataset.img_size_h/w (178x22).
img_h: 356   # 1424 / 4
img_w: 44    # 176 / 4
in_chans: ${dataset.in_chans}

grid_size: 5

# Learnable conv stem (replaces the old fixed bilinear resize): a couple of
# cheap, ordinary strided Conv2d layers downsample the native
# ${dataset.img_height}x${dataset.img_width} map to img_h x img_w before the
# (expensive) KAN-conv layers. Same resolution/RAM footprint the KAN layers
# see as before (img_h x img_w) — only how that resolution is reached
# changes, from a fixed interpolation to something the network can learn.
# native/target = 1424/356 = 176/44 = 4 = 2^stem_layers.
#
# stem_channels stays at 1 (matching the original in_chans): conv1
# (KAN_Convolutional_Layer) instantiates in_channels x out_channels KANLinear
# kernels and evaluates each over the full output map, so its cost scales
# multiplicatively with stem_channels — widening it (tried 8: OOM'd
# immediately, 40 kernels instead of 5) multiplies conv1's cost, not the
# stem's. stem_hidden_channels gives the stem itself richer intermediate
# features without touching conv1's input width.
native_h: ${dataset.img_height}
native_w: ${dataset.img_width}
stem_channels: 1
stem_hidden_channels: 8
stem_layers: 2
