# @package _global_
defaults:
  - /sweep/_reduction_sweep
  - override /hydra/sweeper: optuna
  - override /hydra/sweeper/sampler: tpe
  - override /model: wavkan
  - override /objective: mse

seed: 42

# Stage-1 winner, pinned.
model:
  n_hidden_layers: 1
  hidden_width_0: 512

optimizer:
  lr: 0.001
  weight_decay: 0.0

training:
  epochs: 30   # max budget; early stopping ends trials sooner
  es_patience: 15
  es_min_delta: 0.0001

hydra:
  sweeper:
    sampler:
      seed: ${seed}
      n_startup_trials: 10
    direction: minimize

    n_trials: 40
    n_jobs: 1
    params:
      model.wavelet_type: choice(mexican_hat, morlet, dog, meyer, shannon)
