# @package _global_
defaults:
  - override /hydra/sweeper: optuna
  - override /hydra/sweeper/sampler: tpe
  - override /model: kat
  - override /objective: mse

seed: 42

# Stage-1 winner (architecture + optimizer + batch size), pinned below.
model:
  embed_dim: 128
  depth: 7
  num_heads: 2
  mlp_ratio: 4.0

optimizer:
  lr: 0.0028178435672808855
  weight_decay: 0.0015707848547466031

training:
  epochs: 20
  batch_size: 128

hydra:
  sweeper:
    sampler:
      seed: ${seed}
      n_startup_trials: 10
    direction: minimize

    n_trials: 20
    n_jobs: 1
    params:
      model.drop_path_rate: interval(0.0, 0.2)
      model.act_init: choice(gelu, swish)
      model.stem_channels: choice(4, 8, 16, 32)
