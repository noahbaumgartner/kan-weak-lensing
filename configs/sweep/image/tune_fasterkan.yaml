# @package _global_
defaults:
  - /sweep/tune_base
  - /sweep/image/_reduction_sweep
  - override /model: fasterkan
  - override /training: adam

training:
  epochs: 50   # max budget; early stopping (configs/training/adam.yaml) ends trials sooner

hydra:
  sweeper:
    n_trials: 50
    params:
      model.num_grids: range(4, 33)
      model.exponent: range(2, 5)
      model.inv_denominator: interval(0.1, 1.0)
