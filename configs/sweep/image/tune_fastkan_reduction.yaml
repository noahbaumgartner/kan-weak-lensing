# @package _global_
#
# Stage 2 of the staged fastkan sweep (siehe README "Gestaffeltes Sweeping"):
# model.num_grids + Reduction-Methode/-Knobs. Architektur
# (model.n_hidden_layers/hidden_width_*) und Optimizer (lr/weight_decay)
# werden NICHT hier gesweept, sondern muessen als fixe Overrides von Stage 1
# (tune_fastkan_arch.yaml) mitgegeben werden, z.B.:
#   sbatch --export=ALL,EXPERIMENT=...,SWEEP=image/tune_fastkan_reduction,\
#     EXTRA_weak_lensing="model.n_hidden_layers=2 model.hidden_width_0=494 \
#     model.hidden_width_1=409 optimizer.lr=8e-4 optimizer.weight_decay=1e-5" \
#     scripts/tune_fastkan.submit
defaults:
  - /sweep/image/_reduction_sweep
  - override /hydra/sweeper: optuna
  - override /hydra/sweeper/sampler: tpe
  - override /model: fastkan

seed: 42

training:
  epochs: 50   # max budget; early stopping (configs/training/default.yaml) ends trials sooner

hydra:
  sweeper:
    sampler:
      seed: ${seed}
      n_startup_trials: 10
    direction: minimize

    n_trials: 50
    n_jobs: 1
    params:
      model.num_grids: range(4, 51)
