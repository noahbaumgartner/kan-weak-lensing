# @package _global_
#
# Stage 2 of the staged fasterkan sweep (siehe README "Gestaffeltes
# Sweeping"), objective=score. Architektur ist auf den Stage-1-Gewinner
# (WL-Auswertung.xlsx, SCORE-Spalte) fest gepinnt: model.num_grids/exponent/
# inv_denominator + Reduction-Methode/-Knobs bleiben gesweept.
#   sbatch --export=ALL,EXPERIMENT=...,SWEEP=image/tune_fasterkan_reduction_score \
#     scripts/tune_fasterkan.submit
defaults:
  - /sweep/image/_reduction_sweep
  - override /hydra/sweeper: optuna
  - override /hydra/sweeper/sampler: tpe
  - override /model: fasterkan
  - override /objective: score

seed: 42

model:
  n_hidden_layers: 3
  hidden_width_0: 512
  hidden_width_1: 512
  hidden_width_2: 256

training:
  epochs: 30   # max budget; early stopping ends trials sooner
  # Stage-1 default (es_patience=12, es_min_delta=0.001) cut trials off too
  # early against a 20-epoch cap and a 0.1%-relative improvement bar. Wider
  # patience + smaller min_delta let genuinely-still-improving trials run
  # further before being declared plateaued.
  es_patience: 15
  es_min_delta: 0.0001

hydra:
  sweeper:
    sampler:
      seed: ${seed}
      n_startup_trials: 10
    direction: minimize

    n_trials: 40
    n_jobs: 1
    params:
      model.num_grids: range(4, 33)
      model.exponent: range(2, 5)
      model.inv_denominator: interval(0.1, 1.0)
