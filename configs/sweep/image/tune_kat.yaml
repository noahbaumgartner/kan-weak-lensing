# @package _global_
defaults:
  - override /hydra/sweeper: optuna
  - override /hydra/sweeper/sampler: tpe
  - override /model: kat
  - override /training: adam

seed: 42

training:
  epochs: 25

hydra:
  sweeper:
    sampler:
      seed: ${seed}
      n_startup_trials: 10  # random-sample this many trials before TPE kicks in
    direction: minimize

    n_trials: 50
    n_jobs: 1
    params:
      optimizer: choice(adam, adamw, sgd)
      training.batch_size: choice(64, 128, 256)
      model.embed_dim: choice(32, 64, 128)
      model.depth: range(2, 7)
      model.num_heads: choice(2, 4, 8)
      model.mlp_ratio: choice(2.0, 4.0)
      model.drop_path_rate: interval(0.0, 0.2)
      model.act_init: choice(gelu, swish)
      # Same proven range as tune_efficientkan. The old (1e-3, 1.0) upper bound
      # diverges instantly now that labels are standardised (loss is O(1)).
      optimizer.lr: tag(log, interval(1e-5, 5e-3))
      ++optimizer.weight_decay: tag(log, interval(1e-6, 1e-2))
      ++optimizer.momentum: interval(0.0, 0.99)
