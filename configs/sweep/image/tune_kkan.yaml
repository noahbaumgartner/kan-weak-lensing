# @package _global_
defaults:
  - override /hydra/sweeper: optuna
  - override /hydra/sweeper/sampler: tpe
  - override /model: kkan

seed: 42

training:
  epochs: 20

hydra:
  sweeper:
    sampler:
      seed: ${seed}
      n_startup_trials: 10 # random-sample this many trials before TPE kicks in
    direction: minimize

    n_trials: 30
    n_jobs: 1
    params:
      # See tune_kkan_arch.yaml — 128/256 OOM at the current /4 resolution +
      # conv stem (conv1 alone needs ~26GB at batch=128 on a 31.73GB GPU);
      # 16/32/64 all confirmed working.
      training.batch_size: choice(16, 32, 64)
      model.grid_size: range(3, 21)
      # Same proven range as tune_efficientkan. The old (1e-3, 1.0) upper bound
      # diverges instantly now that labels are standardised (loss is O(1)).
      optimizer.lr: tag(log, interval(1e-5, 5e-3))
      optimizer.weight_decay: tag(log, interval(1e-6, 1e-2))
