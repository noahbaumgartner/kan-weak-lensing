# @package _global_
defaults:
  - /sweep/tune_base
  - override /model: efficientkan
  - override /training: adam

training:
  epochs: 20
  grad_clip: 1.0  # score_inference (lam=1e3) needs clipping to avoid NaN

hydra:
  sweeper:
    n_trials: 10
    params:
      optimizer: choice(adam, adamw)
      model.grid_size: range(3, 51)
      optimizer.lr: tag(log, interval(1e-5, 5e-3))
      ++optimizer.weight_decay: tag(log, interval(1e-6, 1e-2))
# Image -> vector reduction (avgpool | kymatio | conv | powerspectrum) is NOT
# swept: pass it to the submit job via REDUCTION=... (default avgpool).
# pool_stride / scattering_J / conv_* / ps_* come from
# configs/dataset/weak_lensing.yaml.
