# @package _global_
#
# Stage 1 of the staged kkan sweep (siehe README "Gestaffeltes Sweeping").
# KKAN hat keinen Reduction-Wrapper (Conv-Architektur ist fest in
# KKAN_Small verdrahtet) und keine eigenen Breiten-/Tiefen-Knoepfe — hier
# gesweept werden Optimizer + training.batch_size als die "generischen"
# Kapazitaets-/Trainings-Knoepfe. model.grid_size (das eigentliche KAN-
# Spline-Hyperparameter) bleibt auf seinem Config-Default fixiert.
#
# Nach diesem Lauf: besten Trial in MLflow ansehen, Optimizer + batch_size
# als fixe Overrides in Stage 2 (tune_kkan_model.yaml, via EXTRA_weak_lensing)
# mitgeben.
defaults:
  - /sweep/image/_optimizer_sweep
  - override /hydra/sweeper: optuna
  - override /hydra/sweeper/sampler: tpe
  - override /model: kkan

seed: 42

training:
  epochs: 20

hydra:
  sweeper:
    sampler:
      seed: ${seed}
      n_startup_trials: 10
    direction: minimize

    n_trials: 50
    n_jobs: 1
    params:
      # Range confirmed empirically (scripts/debug_kkan_convstem.py) against
      # the current img_h/img_w=356x44 (/4) resolution + conv stem: conv1
      # (KAN_Convolutional_Layer) alone already needs ~26GB at batch=128 on a
      # 31.73GB GPU, before conv2/backward/optimizer even run — 128/256
      # OOM essentially every time. batch=16 confirmed working.
      training.batch_size: choice(8, 16, 32)
