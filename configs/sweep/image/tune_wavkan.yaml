# @package _global_
defaults:
  - /sweep/tune_base
  - /sweep/image/_reduction_sweep
  - override /model: wavkan
  - override /training: adam

training:
  epochs: 50   # max budget; early stopping (configs/training/adam.yaml) ends trials sooner

hydra:
  sweeper:
    n_trials: 50
    params:
      model.wavelet_type: choice(mexican_hat, morlet, dog, meyer, shannon)
