# @package _global_
#
# Stage 2 of the staged fasterkan sweep (siehe README "Gestaffeltes
# Sweeping"): model.num_grids/exponent/inv_denominator + Reduction-Methode/
# -Knobs. Architektur (model.n_hidden_layers/hidden_width_*) und Optimizer
# (lr/weight_decay) werden NICHT hier gesweept, sondern muessen als fixe
# Overrides von Stage 1 (tune_fasterkan_arch.yaml) mitgegeben werden, z.B.:
#   sbatch --export=ALL,EXPERIMENT=...,SWEEP=image/tune_fasterkan_reduction,\
#     EXTRA_weak_lensing="model.n_hidden_layers=2 model.hidden_width_0=494 \
#     model.hidden_width_1=409 optimizer.lr=8e-4 optimizer.weight_decay=1e-5" \
#     scripts/tune_fasterkan.submit
defaults:
  - /sweep/image/_reduction_sweep
  - override /hydra/sweeper: optuna
  - override /hydra/sweeper/sampler: tpe
  - override /model: fasterkan

seed: 42

training:
  epochs: 20   # max budget; early stopping (configs/training/default.yaml) ends trials sooner

hydra:
  sweeper:
    sampler:
      seed: ${seed}
      n_startup_trials: 10
    direction: minimize

    n_trials: 30
    n_jobs: 1
    params:
      model.num_grids: range(4, 33)
      model.exponent: range(2, 5)
      model.inv_denominator: interval(0.1, 1.0)
