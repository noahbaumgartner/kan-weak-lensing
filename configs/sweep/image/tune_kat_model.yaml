# @package _global_
#
# Stage 2 of the staged kat sweep (siehe README "Gestaffeltes Sweeping"):
# model.drop_path_rate/act_init (KAT-spezifische Rational-Aktivierung +
# Regularisierung). Architektur (embed_dim/depth/num_heads/mlp_ratio),
# Optimizer und training.batch_size werden NICHT hier gesweept, sondern
# muessen als fixe Overrides von Stage 1 (tune_kat_arch.yaml) mitgegeben
# werden, z.B.:
#   sbatch --export=ALL,EXPERIMENT=...,SWEEP=image/tune_kat_model,\
#     EXTRA_weak_lensing="training.batch_size=128 model.embed_dim=64 \
#     model.depth=4 model.num_heads=4 model.mlp_ratio=4.0 optimizer.lr=8e-4 \
#     optimizer.weight_decay=1e-5" scripts/tune_kat.submit
defaults:
  - override /hydra/sweeper: optuna
  - override /hydra/sweeper/sampler: tpe
  - override /model: kat

seed: 42

training:
  epochs: 20

hydra:
  sweeper:
    sampler:
      seed: ${seed}
      n_startup_trials: 10
    direction: minimize

    n_trials: 30
    n_jobs: 1
    params:
      model.drop_path_rate: interval(0.0, 0.2)
      model.act_init: choice(gelu, swish)
