# @package _global_
#
# Stage 1 of the staged kat sweep (siehe README "Gestaffeltes Sweeping"): die
# Transformer-Architektur (embed_dim/depth/num_heads/mlp_ratio) + Optimizer +
# training.batch_size. Kein Reduction-Wrapper bei KAT (nutzt timm's
# PatchEmbed direkt). model.drop_path_rate/act_init (KAT-spezifische
# Rational-Aktivierung + Regularisierung) bleiben auf ihren Config-Defaults
# fixiert.
#
# Nach diesem Lauf: besten Trial in MLflow ansehen, Architektur + Optimizer +
# batch_size als fixe Overrides in Stage 2 (tune_kat_model.yaml, via
# EXTRA_weak_lensing) mitgeben.
defaults:
  - /sweep/image/_optimizer_sweep
  - override /hydra/sweeper: optuna
  - override /hydra/sweeper/sampler: tpe
  - override /model: kat

seed: 42

training:
  epochs: 25

hydra:
  sweeper:
    sampler:
      seed: ${seed}
      n_startup_trials: 10
    direction: minimize

    n_trials: 25
    n_jobs: 1
    params:
      training.batch_size: choice(64, 128, 256)
      model.embed_dim: choice(32, 64, 128)
      model.depth: range(2, 7)
      model.num_heads: choice(2, 4, 8)
      model.mlp_ratio: choice(2.0, 4.0)
