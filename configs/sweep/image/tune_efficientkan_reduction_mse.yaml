# @package _global_
#
# Stage 2 of the staged efficientkan sweep (siehe README "Gestaffeltes
# Sweeping"), objective=mse. Architektur ist auf den Stage-1-Gewinner
# (WL-Auswertung.xlsx, MSE-Spalte) fest gepinnt: model.grid_size +
# Reduction-Methode/-Knobs bleiben gesweept.
#   sbatch --export=ALL,EXPERIMENT=...,SWEEP=image/tune_efficientkan_reduction_mse \
#     scripts/tune_efficientkan.submit
defaults:
  - /sweep/image/_reduction_sweep
  - override /hydra/sweeper: optuna
  - override /hydra/sweeper/sampler: tpe
  - override /model: efficientkan
  - override /objective: mse

seed: 42

model:
  n_hidden_layers: 3
  hidden_width_0: 384
  hidden_width_1: 512
  hidden_width_2: 128

training:
  epochs: 20   # max budget; early stopping (configs/training/default.yaml) ends trials sooner

hydra:
  sweeper:
    sampler:
      seed: ${seed}
      n_startup_trials: 10
    direction: minimize

    n_trials: 30
    n_jobs: 1
    params:
      model.grid_size: range(3, 51)
