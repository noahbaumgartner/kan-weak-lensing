# @package _global_
#
# Stage 1 of the staged ensemble sweep (siehe README "Gestaffeltes Sweeping"):
# nur model.n_members + Optimizer. model.member.num_grids bleibt auf seinem
# Config-Default fixiert. dataset.reduction wird auf conv gepinnt (statt
# Dataset-Default avgpool) — conv erhaelt mehr kleinskalige/nicht-gausssche
# Information, die noetig ist, um die Omega_m-sigma8-Degenerescence zu
# brechen. IMMER zusammen mit objective=ensemble laufen lassen.
#
# Nach diesem Lauf: besten Trial in MLflow ansehen, n_members + Optimizer-
# Werte als fixe Overrides in Stage 2 (tune_ensemble_reduction.yaml, via
# EXTRA_weak_lensing) mitgeben.
defaults:
  - /sweep/image/_optimizer_sweep
  - override /hydra/sweeper: optuna
  - override /hydra/sweeper/sampler: tpe

seed: 42

dataset:
  reduction: conv

training:
  epochs: 20   # max budget; early stopping (configs/training/default.yaml) ends trials sooner

hydra:
  sweeper:
    sampler:
      seed: ${seed}
      n_startup_trials: 10
    direction: minimize

    n_trials: 30
    n_jobs: 1
    params:
      model.n_members: choice(4, 8, 12, 16)
