# @package _global_
#
# Stage 1 of the staged fasterkan sweep (siehe README "Gestaffeltes
# Sweeping"): nur Architektur (model.n_hidden_layers/hidden_width_*) +
# Optimizer. model.num_grids/exponent/inv_denominator bleiben auf ihren
# Config-Defaults fixiert. dataset.reduction wird auf conv gepinnt (statt
# Dataset-Default avgpool) — conv erhaelt mehr kleinskalige/nicht-gausssche
# Information, die noetig ist, um die Omega_m-sigma8-Degenerescence zu
# brechen.
#
# Nach diesem Lauf: besten Trial in MLflow ansehen, dessen Architektur- und
# Optimizer-Werte als fixe Overrides in Stage 2
# (tune_fasterkan_reduction.yaml, via EXTRA_weak_lensing) mitgeben.
defaults:
  - /sweep/tune_base
  - /sweep/image/_optimizer_sweep
  - override /model: fasterkan

dataset:
  reduction: conv

training:
  epochs: 20   # max budget; early stopping (configs/training/default.yaml) ends trials sooner

hydra:
  sweeper:
    n_trials: 30
