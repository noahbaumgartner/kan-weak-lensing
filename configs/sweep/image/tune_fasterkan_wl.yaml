# @package _global_
defaults:
  - /sweep/tune_base
  - override /model: fasterkan
  - override /training: adam

training:
  epochs: 20
  grad_clip: 1.0  # score_inference (lam=1e3) needs clipping to avoid NaN

hydra:
  sweeper:
    n_trials: 10
    params:
      optimizer: choice(adam, adamw)
      model.num_grids: range(4, 33)
      model.exponent: range(2, 5)
      model.inv_denominator: interval(0.1, 1.0)
      optimizer.lr: tag(log, interval(1e-5, 5e-3))
      ++optimizer.weight_decay: tag(log, interval(1e-6, 1e-2))
# Image -> vector reduction (avgpool | kymatio) is NOT swept: pass it to the
# submit job via REDUCTION=... (default avgpool). pool_stride / scattering_J
# come from configs/dataset/weak_lensing.yaml.
