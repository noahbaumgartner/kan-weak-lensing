# @package _global_
defaults:
  - override /hydra/sweeper: optuna
  - override /hydra/sweeper/sampler: tpe
  - override /model: kat
  - override /objective: score

seed: 42

# Stage-1 winner (architecture + optimizer + batch size), pinned below.
model:
  embed_dim: 32
  depth: 5
  num_heads: 4
  mlp_ratio: 2.0

optimizer:
  lr: 0.0005466248761032108
  weight_decay: 0.004558740577376854

training:
  epochs: 20
  batch_size: 64

hydra:
  sweeper:
    sampler:
      seed: ${seed}
      n_startup_trials: 10
    direction: minimize

    n_trials: 20
    n_jobs: 1
    params:
      model.drop_path_rate: interval(0.0, 0.2)
      model.act_init: choice(gelu, swish)
      model.stem_channels: choice(4, 8, 16, 32)
