# @package _global_
defaults:
  - /sweep/_optimizer_sweep
  - override /hydra/sweeper: optuna
  - override /hydra/sweeper/sampler: tpe
  - override /model: kkan

seed: 42

training:
  epochs: 20

hydra:
  sweeper:
    sampler:
      seed: ${seed}
      n_startup_trials: 10
    direction: minimize

    n_trials: 50
    n_jobs: 1
    params:
      training.batch_size: choice(16, 32, 64)
